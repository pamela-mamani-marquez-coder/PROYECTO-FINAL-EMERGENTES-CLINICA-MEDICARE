{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header text-center border-0 py-3" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-check-circle text-white" style="font-size: 2rem;"></i>
                        <span class="fw-bold text-white" style="font-size: 1.3rem;">
                            ¡Registro Exitoso!
                        </span>
                    </div>
                </div>
                <div class="card-body p-4 text-center">
                    <h5 class="fw-bold mb-3">¡Bienvenido a MediCare!</h5>
                    <p>Tu cuenta ha sido creada exitosamente.</p>
                    
                    <div class="p-3 mb-3" style="background: #e8f0fe; border-radius: 12px;">
                        <p class="mb-1 text-muted" style="font-size: 0.9rem;">Tu usuario es:</p>
                        <h3 class="fw-bold text-primary">{{ username }}</h3>
                    </div>
                    
                    <p class="text-muted" style="font-size: 0.9rem;">
                        <i class="fas fa-info-circle me-1"></i>
                        Usa este usuario junto con tu contraseña para iniciar sesión.
                    </p>
                    
                    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg rounded-pill px-5 mt-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
