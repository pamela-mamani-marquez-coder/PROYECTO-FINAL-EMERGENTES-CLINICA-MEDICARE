{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header con gradiente morado -->
                <div class="card-header text-center border-0 py-3" style="background: linear-gradient(135deg, #7c3aed, #6d28d9);">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-edit text-white" style="font-size: 1.3rem;"></i>
                        <span class="fw-bold text-white" style="font-size: 1.1rem;">
                            Editar Factura
                        </span>
                    </div>
                    <p class="text-white-50 mb-0" style="font-size: 0.75rem;">
                        {{ factura.numero_factura }}
                    </p>
                </div>

                <!-- Cuerpo del formulario -->
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('factura.editar', id=factura.id) }}">
                        <!-- Monto y Método de Pago -->
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label for="monto_total" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-dollar-sign" style="color: #7c3aed; margin-right: 6px;"></i> Monto Total (Bs.)
                                </label>
                                <input type="number" step="0.01" class="form-control form-control-sm" id="monto_total" name="monto_total" 
                                       value="{{ factura.monto_total }}" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #ddd6fe;">
                            </div>
                            <div class="col-md-6">
                                <label for="metodo_pago" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-credit-card" style="color: #7c3aed; margin-right: 6px;"></i> Método de Pago
                                </label>
                                <select class="form-select form-select-sm" id="metodo_pago" name="metodo_pago" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #ddd6fe;">
                                    <option value="Efectivo" {% if factura.metodo_pago == 'Efectivo' %}selected{% endif %}>Efectivo</option>
                                    <option value="Tarjeta de Crédito" {% if factura.metodo_pago == 'Tarjeta de Crédito' %}selected{% endif %}>Tarjeta de Crédito</option>
                                    <option value="Tarjeta de Débito" {% if factura.metodo_pago == 'Tarjeta de Débito' %}selected{% endif %}>Tarjeta de Débito</option>
                                    <option value="Transferencia Bancaria" {% if factura.metodo_pago == 'Transferencia Bancaria' %}selected{% endif %}>Transferencia Bancaria</option>
                                    <option value="Seguro Médico" {% if factura.metodo_pago == 'Seguro Médico' %}selected{% endif %}>Seguro Médico</option>
                                </select>
                            </div>
                        </div>

                        <!-- Estado del Pago -->
                        <div class="mt-2">
                            <label for="estado_pago" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-circle" style="color: #7c3aed; margin-right: 6px;"></i> Estado del Pago
                            </label>
                            <select class="form-select form-select-sm" id="estado_pago" name="estado_pago" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #ddd6fe;">
                                <option value="pendiente" {% if factura.estado_pago == 'pendiente' %}selected{% endif %}>Pendiente</option>
                                <option value="pagado" {% if factura.estado_pago == 'pagado' %}selected{% endif %}>Pagado</option>
                                <option value="cancelado" {% if factura.estado_pago == 'cancelado' %}selected{% endif %}>Cancelado</option>
                            </select>
                        </div>

                        <!-- Botones -->
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn" style="border-radius: 50px; padding: 10px; font-weight: 600; font-size: 0.9rem; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); transition: all 0.3s ease;">
                                <i class="fas fa-save me-2"></i>Actualizar Factura
                            </button>
                            <a href="{{ url_for('factura.index') }}" class="btn btn-outline-secondary" style="border-radius: 50px; padding: 10px; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease;">
                                <i class="fas fa-arrow-left me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rounded-4 {
        border-radius: 1rem;
    }
    .form-control:focus, .form-select:focus {
        border-color: #7c3aed;
        box-shadow: 0 0 0 0.15rem rgba(124, 58, 237, 0.2);
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4) !important;
    }
    .btn-outline-secondary:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
