{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <h1 style="font-weight: 800; color: #0d1b3e;">
        <i class="fas fa-chart-pie" style="color: #2563eb; margin-right: 10px;"></i>Estadísticas de Facturación
    </h1>

    <div class="row g-4 mt-2">
        <div class="col-md-3">
            <div class="card-glass text-center p-4">
                <i class="fas fa-file-invoice" style="font-size: 2.5rem; color: #2563eb;"></i>
                <h2 class="mt-2">{{ total_facturas }}</h2>
                <p class="text-muted">Total Facturas</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-glass text-center p-4" style="border-left: 4px solid #28a745;">
                <i class="fas fa-check-circle" style="font-size: 2.5rem; color: #28a745;"></i>
                <h2 class="mt-2">{{ facturas_pagadas }}</h2>
                <p class="text-muted">Pagadas</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-glass text-center p-4" style="border-left: 4px solid #ffc107;">
                <i class="fas fa-clock" style="font-size: 2.5rem; color: #ffc107;"></i>
                <h2 class="mt-2">{{ facturas_pendientes }}</h2>
                <p class="text-muted">Pendientes</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-glass text-center p-4" style="border-left: 4px solid #2563eb;">
                <i class="fas fa-dollar-sign" style="font-size: 2.5rem; color: #2563eb;"></i>
                <h2 class="mt-2">Bs. {{ "%.2f"|format(total_ingresos) }}</h2>
                <p class="text-muted">Total Ingresos</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
