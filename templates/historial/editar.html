{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header con gradiente rosado -->
                <div class="card-header text-center border-0 py-3" style="background: linear-gradient(135deg, #ec4899, #db2777);">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-edit text-white" style="font-size: 1.3rem;"></i>
                        <span class="fw-bold text-white" style="font-size: 1.1rem;">
                            Editar Historial
                        </span>
                    </div>
                    <p class="text-white-50 mb-0" style="font-size: 0.75rem;">
                        Registro #{{ historial.id }}
                    </p>
                </div>

                <!-- Cuerpo del formulario -->
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('historial.editar', id=historial.id) }}">
                        <!-- Diagnóstico -->
                        <div class="mt-2">
                            <label for="diagnostico" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-stethoscope" style="color: #ec4899; margin-right: 6px;"></i> Diagnóstico
                            </label>
                            <textarea class="form-control form-control-sm" id="diagnostico" name="diagnostico" 
                                      rows="2" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fbcfe8;">{{ historial.diagnostico or '' }}</textarea>
                        </div>

                        <!-- Síntomas -->
                        <div class="mt-2">
                            <label for="sintomas" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-head-side-virus" style="color: #ec4899; margin-right: 6px;"></i> Síntomas
                            </label>
                            <textarea class="form-control form-control-sm" id="sintomas" name="sintomas" 
                                      rows="2" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fbcfe8;">{{ historial.sintomas or '' }}</textarea>
                        </div>

                        <!-- Tratamiento -->
                        <div class="mt-2">
                            <label for="tratamiento" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-pills" style="color: #ec4899; margin-right: 6px;"></i> Tratamiento
                            </label>
                            <textarea class="form-control form-control-sm" id="tratamiento" name="tratamiento" 
                                      rows="2" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fbcfe8;">{{ historial.tratamiento or '' }}</textarea>
                        </div>

                        <!-- Observaciones -->
                        <div class="mt-2">
                            <label for="observaciones" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-comment" style="color: #ec4899; margin-right: 6px;"></i> Observaciones
                            </label>
                            <textarea class="form-control form-control-sm" id="observaciones" name="observaciones" 
                                      rows="2" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fbcfe8;">{{ historial.observaciones or '' }}</textarea>
                        </div>

                        <hr style="border-color: #fbcfe8;">

                        <!-- RECETAS -->
                        <h6 class="fw-semibold mb-2" style="color: #0d1b3e; font-size: 0.9rem;">
                            <i class="fas fa-prescription" style="color: #ec4899; margin-right: 6px;"></i> Recetas
                        </h6>
                        
                        <!-- Contenedor de recetas existentes -->
                        <div id="recetas-container">
                            {% if historial.recetas %}
                                {% for receta in historial.recetas %}
                                <div class="receta-item row g-1 mb-2">
                                    <div class="col-md-4">
                                        <input type="text" class="form-control form-control-sm" name="medicamento[]" 
                                               value="{{ receta.medicamento }}" placeholder="Medicamento" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-2">
                                        <input type="text" class="form-control form-control-sm" name="dosis[]" 
                                               value="{{ receta.dosis }}" placeholder="Dosis" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-2">
                                        <input type="text" class="form-control form-control-sm" name="duracion[]" 
                                               value="{{ receta.duracion }}" placeholder="Duración" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-3">
                                        <input type="text" class="form-control form-control-sm" name="indicaciones[]" 
                                               value="{{ receta.indicaciones }}" placeholder="Indicaciones" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-1">
                                        <button type="button" class="btn btn-danger btn-sm" style="border-radius: 50px; padding: 2px 8px; font-size: 0.8rem;" onclick="eliminarReceta(this)">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                                {% endfor %}
                            {% else %}
                                
                                <div class="receta-item row g-1 mb-2">
                                    <div class="col-md-4">
                                        <input type="text" class="form-control form-control-sm" name="medicamento[]" placeholder="Medicamento" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-2">
                                        <input type="text" class="form-control form-control-sm" name="dosis[]" placeholder="Dosis" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-2">
                                        <input type="text" class="form-control form-control-sm" name="duracion[]" placeholder="Duración" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-3">
                                        <input type="text" class="form-control form-control-sm" name="indicaciones[]" placeholder="Indicaciones" style="border-radius: 6px; border-color: #fbcfe8;">
                                    </div>
                                    <div class="col-md-1">
                                        <button type="button" class="btn btn-danger btn-sm" style="border-radius: 50px; padding: 2px 8px; font-size: 0.8rem;" onclick="eliminarReceta(this)">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                            {% endif %}
                        </div>

                        <button type="button" class="btn btn-sm" style="border-radius: 50px; padding: 4px 16px; font-size: 0.8rem; background: linear-gradient(135deg, #ec4899, #db2777); color: white; border: none; margin-top: 5px;" onclick="agregarReceta()">
                            <i class="fas fa-plus me-1"></i>Agregar Medicamento
                        </button>

                        <!-- Botones -->
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn" style="border-radius: 50px; padding: 10px; font-weight: 600; font-size: 0.9rem; background: linear-gradient(135deg, #ec4899, #db2777); color: white; border: none; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); transition: all 0.3s ease;">
                                <i class="fas fa-save me-2"></i>Actualizar Historial
                            </button>
                            <a href="{{ url_for('historial.show', id=historial.id) }}" class="btn btn-outline-secondary" style="border-radius: 50px; padding: 10px; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease;">
                                <i class="fas fa-arrow-left me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function agregarReceta() {
    const container = document.getElementById('recetas-container');
    const nuevoItem = document.createElement('div');
    nuevoItem.className = 'receta-item row g-1 mb-2';
    nuevoItem.innerHTML = `
        <div class="col-md-4">
            <input type="text" class="form-control form-control-sm" name="medicamento[]" placeholder="Medicamento" style="border-radius: 6px; border-color: #fbcfe8;">
        </div>
        <div class="col-md-2">
            <input type="text" class="form-control form-control-sm" name="dosis[]" placeholder="Dosis" style="border-radius: 6px; border-color: #fbcfe8;">
        </div>
        <div class="col-md-2">
            <input type="text" class="form-control form-control-sm" name="duracion[]" placeholder="Duración" style="border-radius: 6px; border-color: #fbcfe8;">
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control form-control-sm" name="indicaciones[]" placeholder="Indicaciones" style="border-radius: 6px; border-color: #fbcfe8;">
        </div>
        <div class="col-md-1">
            <button type="button" class="btn btn-danger btn-sm" style="border-radius: 50px; padding: 2px 8px; font-size: 0.8rem;" onclick="eliminarReceta(this)">
                <i class="fas fa-times"></i>
            </button>
        </div>
    `;
    container.appendChild(nuevoItem);
}

function eliminarReceta(boton) {
    const item = boton.closest('.receta-item');
    if (document.querySelectorAll('.receta-item').length > 1) {
        item.remove();
    } else {
        alert('Debe haber al menos una receta.');
    }
}
</script>

<style>
    .rounded-4 {
        border-radius: 1rem;
    }
    .form-control:focus {
        border-color: #ec4899;
        box-shadow: 0 0 0 0.15rem rgba(236, 72, 153, 0.2);
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4) !important;
    }
    .btn-outline-secondary:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
