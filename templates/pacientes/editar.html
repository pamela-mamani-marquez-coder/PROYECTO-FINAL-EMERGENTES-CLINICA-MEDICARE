{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header con gradiente naranja -->
                <div class="card-header text-center border-0 py-3" style="background: linear-gradient(135deg, #ea580c, #c2410c);">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-user-edit text-white" style="font-size: 1.3rem;"></i>
                        <span class="fw-bold text-white" style="font-size: 1.1rem;">
                            Editar Paciente
                        </span>
                    </div>
                    <p class="text-white-50 mb-0" style="font-size: 0.75rem;">
                        Actualice los datos del paciente
                    </p>
                </div>

                <!-- Cuerpo del formulario -->
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('paciente.editar', id=paciente.id) }}">
                        <!-- Fila: CI, Nombres, Apellidos -->
                        <div class="row g-2">
                            <div class="col-md-4">
                                <label for="ci" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-id-card text-warning me-1"></i> CI
                                </label>
                                <input type="text" class="form-control form-control-sm" id="ci" name="ci" 
                                       value="{{ paciente.ci }}" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                            <div class="col-md-4">
                                <label for="nombres" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-user text-warning me-1"></i> Nombres
                                </label>
                                <input type="text" class="form-control form-control-sm" id="nombres" name="nombres" 
                                       value="{{ paciente.nombres }}" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                            <div class="col-md-4">
                                <label for="apellidos" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-user text-warning me-1"></i> Apellidos
                                </label>
                                <input type="text" class="form-control form-control-sm" id="apellidos" name="apellidos" 
                                       value="{{ paciente.apellidos }}" required style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                        </div>

                        <!-- Fila: Fecha Nacimiento y Género -->
                        <div class="row g-2 mt-2">
                            <div class="col-md-6">
                                <label for="fecha_nacimiento" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-calendar text-warning me-1"></i> Fecha Nacimiento
                                </label>
                                <input type="date" class="form-control form-control-sm" id="fecha_nacimiento" name="fecha_nacimiento" 
                                       value="{{ paciente.fecha_nacimiento.strftime('%Y-%m-%d') if paciente.fecha_nacimiento else '' }}" 
                                       style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                            <div class="col-md-6">
                                <label for="genero" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-venus-mars text-warning me-1"></i> Género
                                </label>
                                <select class="form-select form-select-sm" id="genero" name="genero" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                                    <option value="">Seleccionar</option>
                                    <option value="Masculino" {% if paciente.genero == 'Masculino' %}selected{% endif %}>Masculino</option>
                                    <option value="Femenino" {% if paciente.genero == 'Femenino' %}selected{% endif %}>Femenino</option>
                                    <option value="Otro" {% if paciente.genero == 'Otro' %}selected{% endif %}>Otro</option>
                                </select>
                            </div>
                        </div>

                        <!-- Teléfono y Email -->
                        <div class="row g-2 mt-2">
                            <div class="col-md-6">
                                <label for="telefono" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-phone text-warning me-1"></i> Teléfono
                                </label>
                                <input type="text" class="form-control form-control-sm" id="telefono" name="telefono" 
                                       value="{{ paciente.telefono or '' }}" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                    <i class="fas fa-envelope text-warning me-1"></i> Email
                                </label>
                                <input type="email" class="form-control form-control-sm" id="email" name="email" 
                                       value="{{ paciente.email or '' }}" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                            </div>
                        </div>

                        <!-- Seguro Médico -->
                        <div class="mt-2">
                            <label for="seguro_medico" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-shield-alt text-warning me-1"></i> Seguro Médico
                            </label>
                            <input type="text" class="form-control form-control-sm" id="seguro_medico" name="seguro_medico" 
                                   value="{{ paciente.seguro_medico or '' }}" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">
                        </div>

                        <!-- Dirección -->
                        <div class="mt-2">
                            <label for="direccion" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-map-marker-alt text-warning me-1"></i> Dirección
                            </label>
                            <textarea class="form-control form-control-sm" id="direccion" name="direccion" 
                                      rows="2" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">{{ paciente.direccion or '' }}</textarea>
                        </div>

                        <!-- Alergias -->
                        <div class="mt-2">
                            <label for="alergias" class="form-label fw-semibold" style="color: #0d1b3e; font-size: 0.8rem;">
                                <i class="fas fa-allergies text-warning me-1"></i> Alergias
                            </label>
                            <textarea class="form-control form-control-sm" id="alergias" name="alergias" 
                                      rows="2" style="border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; border-color: #fed7aa;">{{ paciente.alergias or '' }}</textarea>
                        </div>

                        <!-- Botones -->
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn" style="border-radius: 50px; padding: 10px; font-weight: 600; font-size: 0.9rem; background: linear-gradient(135deg, #ea580c, #c2410c); color: white; border: none; box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3); transition: all 0.3s ease;">
                                <i class="fas fa-save me-2"></i>Actualizar Paciente
                            </button>
                            <a href="{{ url_for('paciente.index') }}" class="btn btn-outline-secondary" style="border-radius: 50px; padding: 10px; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease;">
                                <i class="fas fa-arrow-left me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rounded-4 {
        border-radius: 1rem;
    }
    .form-control:focus, .form-select:focus {
        border-color: #ea580c;
        box-shadow: 0 0 0 0.15rem rgba(234, 88, 12, 0.2);
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(234, 88, 12, 0.4) !important;
    }
    .btn-outline-secondary:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
